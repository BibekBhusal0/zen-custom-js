name: Update theme.json and Format

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  update_and_format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update theme.json
        id: update_theme
        run: python .github/workflows/update_theme.py

      - name: Commit theme.json changes
        if: steps.update_theme.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: Update theme.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16.x"

      - name: Install Prettier
        run: npm install --save-dev prettier

      - name: Add node_modules to path
        run: echo "::add-path::./node_modules/.bin"
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: true

      - name: Run Prettier
        run: prettier --write .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: Auto format"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

